<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود به سیستم مدیریت وظایف</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Vazirmatn', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body class="flex items-center justify-center min-h-screen overflow-hidden relative">

    <!-- پس‌زمینه‌های دایره‌ای تزئینی -->
    <div class="absolute w-80 h-80 bg-indigo-600 rounded-full filter blur-[80px] opacity-30 -top-10 -right-10"></div>
    <div class="absolute w-96 h-96 bg-purple-600 rounded-full filter blur-[100px] opacity-20 -bottom-20 -left-20"></div>

    <div class="glass w-full max-w-md p-8 rounded-2xl shadow-2xl z-10 mx-4">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-white mb-2">خوش آمدید</h2>
            <p class="text-gray-400 text-sm">جهت دسترسی به پنل وظایف و گزارشات وارد شوید</p>
        </div>

        <form method="post" action="{% url 'login' %}" class="space-y-6">
            {% csrf_token %}
            
            {% if form.non_field_errors %}
                <div class="bg-red-500/20 border border-red-500/50 text-red-200 text-xs rounded-lg p-3 text-center">
                    {% for error in form.non_field_errors %}
                        {{ error }}
                    {% endfor %}
                </div>
            {% endif %}

            <div>
                <label for="id_username" class="block text-gray-300 text-sm mb-2 font-medium">نام کاربری</label>
                <input type="text" name="username" id="id_username" required
                    class="w-full bg-white/5 border border-white/10 rounded-lg py-2.5 px-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all text-left dir-ltr"
                    placeholder="Username">
            </div>

            <div>
                <label for="id_password" class="block text-gray-300 text-sm mb-2 font-medium">رمز عبور</label>
                <input type="password" name="password" id="id_password" required
                    class="w-full bg-white/5 border border-white/10 rounded-lg py-2.5 px-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all text-left dir-ltr"
                    placeholder="••••••••">
            </div>

            <div class="flex items-center justify-between text-xs text-gray-400">
                <label class="flex items-center space-x-2 space-x-reverse cursor-pointer">
                    <input type="checkbox" class="rounded bg-white/5 border-white/10 text-indigo-600 focus:ring-0 focus:ring-offset-0">
                    <span>مرا به خاطر بسپار</span>
                </label>
                <a href="#" class="hover:text-indigo-400 transition-colors">رمز عبور را فراموش کرده‌اید؟</a>
            </div>

            <button type="submit" 
                class="w-full bg-indigo-600 hover:bg-indigo-500 active:scale-[0.98] text-white font-medium py-3 rounded-lg transition-all duration-150 shadow-lg shadow-indigo-600/30">
                ورود به سیستم
            </button>
        </form>
    </div>

</body>
</html>
